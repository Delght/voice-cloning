[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.format]
# Keep formatting consistent across the repo (Prettier-like).
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
fixable = ["ALL"]

